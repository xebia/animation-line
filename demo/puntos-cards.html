<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>xebia-animation-line · cards de puntos</title>
<style>
  *{box-sizing:border-box;margin:0;}
  :root{--ink:#0b0b0d;--muted:#6b6b73;}
  body{background:#0d0d10;font-family:"Helvetica Neue",Arial,sans-serif;color:#e8e8ee;}
  .nav{position:sticky;top:0;z-index:40;display:flex;gap:6px;align-items:center;padding:12px 20px;background:rgba(13,13,16,.82);backdrop-filter:blur(8px);border-bottom:1px solid #ffffff14;}
  .nav a{color:#cfd6e6;text-decoration:none;font-size:13px;padding:6px 12px;border-radius:99px;border:1px solid #ffffff22;}
  .nav a.home{margin-right:auto;font-weight:700;border:none;}
  .nav a.active{background:#fff;color:#0a1a24;border-color:#fff;}
  .ctrls{position:sticky;top:47px;z-index:30;display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;padding:12px 20px;background:rgba(13,13,16,.78);backdrop-filter:blur(8px);border-bottom:1px solid #ffffff10;}
  .ctrls .grp{display:flex;gap:7px;align-items:center;} .ctrls .lbl{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:.08em;}
  .swat{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #ffffff44;} .swat.sq{border-radius:6px;} .swat.active{border-color:#fff;transform:scale(1.12);}
  .zoomctl{position:absolute;top:10px;right:10px;z-index:6;display:flex;align-items:center;gap:6px;background:#0009;border:1px solid #ffffff33;border-radius:99px;padding:4px 8px;backdrop-filter:blur(8px);}
  .zoomctl button{width:22px;height:22px;border-radius:50%;border:1px solid #ffffff55;background:#ffffff14;color:#fff;cursor:pointer;font-size:15px;line-height:1;padding:0;font-family:inherit;}
  .zoomctl button:hover{background:#ffffff2e;} .zoomctl span{color:#fff;font-size:11px;min-width:34px;text-align:center;}

  #cards{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:repeat(2,1fr);gap:22px;}
  .xcard{position:relative;background:#fff;height:520px;overflow:hidden;display:flex;box-shadow:0 18px 50px #0007;color:var(--ink);}
  .xcard.wide{grid-column:1/-1;height:420px;} .xcard h2{font-weight:700;letter-spacing:-.025em;line-height:1.05;}
  .viz{position:relative;background:#06101a;overflow:hidden;} .viz canvas{position:absolute;inset:0;width:100%;height:100%;}
  .kicker{font-size:13px;color:var(--muted);}
  .accent{width:4px;flex:0 0 4px;background:linear-gradient(180deg,#ff7eb3,#8a5cff,#3fd6a0);}
  /* split */
  .xcard.split .text{flex:1;padding:30px 28px;display:flex;flex-direction:column;}
  .xcard.split .text .top{margin-bottom:auto;} .xcard.split h2{font-size:30px;margin:24px 0;}
  .xcard.split .viz{flex:0 0 42%;}
  /* cover */
  .xcard.cover .viz{position:absolute;inset:0;}
  .xcard.cover .overlay{position:absolute;inset:0;z-index:2;padding:30px 28px;display:flex;flex-direction:column;color:#fff;background:linear-gradient(180deg,rgba(0,0,0,.45),rgba(0,0,0,0) 36%,rgba(0,0,0,0) 58%,rgba(0,0,0,.62));}
  .xcard.cover .overlay .top{margin-bottom:auto;} .xcard.cover .overlay .kicker{color:#e6e9f2;}
  .xcard.cover .overlay .foot{display:flex;flex-direction:column;gap:14px;} .xcard.cover h2{font-size:30px;color:#fff;}
  .xcard.cover.minimal .overlay{background:linear-gradient(180deg,rgba(0,0,0,0) 55%,rgba(0,0,0,.6));} .xcard.cover.minimal h2{font-size:24px;font-weight:600;}
  /* stats */
  .xcard.statscard{flex-direction:column;} .xcard.statscard .text{padding:28px 28px 12px;} .xcard.statscard h2{font-size:28px;} .xcard.statscard .sub{font-size:13px;color:var(--muted);margin-top:8px;}
  .xcard.statscard .viz{flex:1;} .statsviz .tiles{position:absolute;inset:auto 22px 22px 22px;z-index:3;display:flex;gap:12px;}
  .statsviz .tile{flex:1;background:#ffffff14;border-radius:4px;padding:16px 14px;backdrop-filter:blur(6px);color:#eef;}
  .statsviz .tile .n{font-size:38px;font-weight:700;letter-spacing:-.03em;line-height:1;} .statsviz .tile .l{font-size:11px;color:#cdd3e6;margin-top:12px;}

  .herowrap{max-width:1200px;margin:30px auto 0;padding:0 20px;} .hlabel{color:#9aa3b8;font-size:13px;margin:22px 0 12px;}
  .h-split{display:flex;height:520px;overflow:hidden;} .h-split .viz{flex:1 1 62%;} .h-split .panel{flex:0 0 38%;display:flex;flex-direction:column;}
  .h-split .block{padding:40px 44px;display:flex;flex-direction:column;} .h-split .block.purple{flex:0 0 56%;background:#7a1f9c;color:#fff;} .h-split .block.light{flex:1;background:#f3eef6;color:#190a1d;}
  .h-split .stat{font-size:60px;font-weight:600;letter-spacing:-.03em;line-height:1;} .h-split .sub{font-size:20px;margin-top:18px;max-width:24ch;}
  .h-banner{position:relative;height:380px;overflow:hidden;} .h-banner .viz{position:absolute;inset:0;}
  .h-banner .overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;padding:0 56px;color:#fff;background:linear-gradient(90deg,rgba(0,0,0,.55),rgba(0,0,0,0) 70%);}
  .h-banner h2{font-size:42px;font-weight:600;max-width:18ch;} .h-banner .sub{font-size:16px;opacity:.82;margin-top:14px;}
  .h-duo{display:flex;gap:2px;height:420px;} .h-duo .half{flex:1;position:relative;overflow:hidden;} .h-duo .half .viz{position:absolute;inset:0;}
  .h-duo .half .lab{position:absolute;left:22px;bottom:20px;z-index:2;color:#fff;font-size:13px;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 1px 6px #000a;}

  /* fondo claro → texto oscuro en overlays sobre la animación */
  body.cards-light .xcard.cover .overlay,body.cards-light .xcard.cover h2{color:#0b0b0d;}
  body.cards-light .xcard.cover .overlay{background:linear-gradient(180deg,rgba(255,255,255,.4),rgba(255,255,255,0) 36%,rgba(255,255,255,0) 56%,rgba(255,255,255,.62));}
  body.cards-light .xcard.cover .overlay .kicker{color:#444;}
  body.cards-light .h-banner .overlay{color:#0b0b0d;background:linear-gradient(90deg,rgba(255,255,255,.6),rgba(255,255,255,0) 70%);}
  body.cards-light .h-duo .half .lab{color:#0b0b0d;text-shadow:0 1px 6px rgba(255,255,255,.7);}
  body.cards-light .statsviz .tile{background:rgba(255,255,255,.92);color:#0b0b0d;box-shadow:0 6px 22px rgba(0,0,0,.1);}
  body.cards-light .nav{border-color:#00000014;} body.cards-light .nav a{color:#333;border-color:#00000022;} body.cards-light .nav a.active{background:#111;color:#fff;}

  @media(max-width:880px){ #cards{grid-template-columns:1fr;} .h-split,.h-duo{flex-direction:column;height:auto;} .h-split .viz{height:300px;} .h-duo .half{height:260px;} }
</style>
</head>
<body>
  <nav class="nav">
    <a class="home" href="./">xebia-animation-line</a>
    <a href="./lineas.html">Líneas</a>
    <a href="./puntos.html">Puntos</a>
    <a href="./cards.html">Cards líneas</a>
    <a class="active" href="./puntos-cards.html">Cards puntos</a>
  </nav>
  <div class="ctrls">
    <div class="grp"><span class="lbl">Paleta</span><span id="pal" style="display:flex;gap:7px;"></span></div>
    <div class="grp"><span class="lbl">Fondo</span><span id="bgs" style="display:flex;gap:7px;"></span></div>
  </div>
  <div id="cards"></div>
  <div class="herowrap" id="heroes"></div>
  <script type="module" src="./puntos-cards.ts"></script>
</body>
</html>

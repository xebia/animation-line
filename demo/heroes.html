<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xebia · heroes con animación</title>
<style>
  *{box-sizing:border-box;margin:0;}
  body{background:#0d0d10;font-family:"Helvetica Neue",Arial,sans-serif;color:#e8e8ee;padding:0 0 56px;}
  header{max-width:1280px;margin:0 auto;padding:26px 24px 8px;display:flex;justify-content:space-between;align-items:center;}
  header h1{font-size:16px;font-weight:700;}
  header a{color:#cfd6e6;text-decoration:none;font-size:13px;border:1px solid #ffffff33;padding:7px 12px;border-radius:99px;}
  .wrap{max-width:1280px;margin:0 auto;padding:8px 24px;}
  .hlabel{font-size:13px;color:#9aa3b8;margin:28px 0 12px;letter-spacing:.04em;}

  /* base viz */
  .viz{position:relative;background:#06101a;overflow:hidden;}
  .viz canvas{position:absolute;inset:0;}
  h2{font-weight:600;letter-spacing:-.03em;line-height:1.04;}
  .sub{opacity:.82;font-weight:400;}
  .kicker{font-size:12px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;}
  .pill{align-self:flex-start;border:1px solid #ffffff66;background:#ffffff1a;color:#fff;
    padding:10px 18px;border-radius:99px;font-size:13px;cursor:pointer;font-family:inherit;backdrop-filter:blur(6px);}

  /* zoom control */
  .zoomctl{position:absolute;top:10px;right:10px;z-index:6;display:flex;align-items:center;gap:6px;
    background:#0009;border:1px solid #ffffff33;border-radius:99px;padding:4px 8px;backdrop-filter:blur(6px);}
  .zoomctl button{width:22px;height:22px;border-radius:50%;border:1px solid #ffffff55;background:#ffffff14;color:#fff;cursor:pointer;font-size:15px;line-height:1;padding:0;font-family:inherit;}
  .zoomctl button:hover{background:#ffffff2e;}
  .zoomctl span{color:#fff;font-size:11px;min-width:34px;text-align:center;}

  /* H1 split-stats */
  .h-split{display:flex;height:560px;overflow:hidden;}
  .h-split .viz{flex:1 1 62%;background:#160a2b;}
  .h-split .panel{flex:0 0 38%;display:flex;flex-direction:column;}
  .h-split .block{padding:42px 46px;display:flex;flex-direction:column;}
  .h-split .block.purple{flex:0 0 56%;background:#7a1f9c;color:#fff;}
  .h-split .block.light{flex:1;background:#f3eef6;color:#190a1d;}
  .h-split .stat{font-size:64px;font-weight:600;letter-spacing:-.03em;line-height:1;}
  .h-split .sub{font-size:20px;margin-top:18px;max-width:24ch;}

  /* H2 banner */
  .h-banner{position:relative;height:360px;overflow:hidden;}
  .h-banner .viz{position:absolute;inset:0;background:#06101a;}
  .h-banner .overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;
    padding:0 56px;background:linear-gradient(90deg,rgba(0,0,0,.55),rgba(0,0,0,0) 70%);}
  .h-banner h2{font-size:42px;max-width:18ch;}
  .h-banner .sub{font-size:16px;margin-top:14px;}

  /* H3 centered */
  .h-centered{position:relative;height:480px;overflow:hidden;}
  .h-centered .viz{position:absolute;inset:0;background:#06101a;}
  .h-centered .overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:0 40px;background:radial-gradient(60% 60% at 50% 50%,rgba(0,0,0,.5),rgba(0,0,0,.15));}
  .h-centered h2{font-size:46px;max-width:16ch;}
  .h-centered .sub{font-size:16px;margin-top:16px;max-width:40ch;}

  /* H4 text-left */
  .h-textleft{display:flex;height:520px;overflow:hidden;}
  .h-textleft .text{flex:0 0 42%;background:#f3eef6;color:#160a1d;padding:46px;display:flex;flex-direction:column;}
  .h-textleft .text .kicker{opacity:.6;}
  .h-textleft h2{font-size:38px;margin:26px 0 auto;}
  .h-textleft .viz{flex:1;}

  /* H5 stat-cover */
  .h-statcover{position:relative;height:460px;overflow:hidden;}
  .h-statcover .viz{position:absolute;inset:0;background:#06101a;}
  .h-statcover .overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;
    padding:48px;background:linear-gradient(180deg,rgba(0,0,0,0) 50%,rgba(0,0,0,.6) 100%);}
  .h-statcover .stat{font-size:90px;font-weight:600;letter-spacing:-.04em;line-height:.92;}
  .h-statcover .sub{font-size:20px;margin-top:10px;}

  /* H6 duo */
  .h-duo{display:flex;gap:2px;height:430px;}
  .h-duo .half{flex:1;position:relative;overflow:hidden;}
  .h-duo .half .viz{position:absolute;inset:0;}
  .h-duo .half .lab{position:absolute;left:22px;bottom:20px;z-index:2;font-size:13px;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 1px 6px #000a;}

  @media (max-width:880px){
    .h-split,.h-textleft,.h-duo{flex-direction:column;height:auto;}
    .h-split .viz,.h-textleft .viz{height:300px;}
    .h-duo .half{height:260px;}
  }
</style>
</head>
<body>
  <header>
    <h1>Xebia · heroes con animación</h1>
    <a href="./">← ver grid</a>
  </header>
  <div class="wrap" id="wrap"></div>
  <script type="module" src="./heroes.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>xebia-animation-line · grid</title>
<style>
  *{box-sizing:border-box;margin:0;}
  body{background:#05080f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#cde;}
  header{max-width:1240px;margin:0 auto;padding:26px 20px 6px;text-align:center;}
  header h1{font-size:18px;font-weight:600;letter-spacing:.02em;}
  header .sub{font-size:13px;opacity:.55;margin-top:4px;}
  #grid{
    max-width:1500px;margin:0 auto;padding:24px;
    display:grid;grid-template-columns:repeat(2,1fr);gap:24px;
  }
  .card{position:relative;aspect-ratio:4/3;border-radius:16px;overflow:hidden;
    background:#06101a;border:1px solid #ffffff14;box-shadow:0 8px 30px #0006;}
  .card .stage{position:absolute;inset:0;}
  .card .label{position:absolute;left:14px;top:12px;z-index:2;font-size:12px;
    letter-spacing:.09em;text-transform:uppercase;opacity:.9;text-shadow:0 1px 6px #000a;}
  .card .swatches{position:absolute;left:0;right:0;bottom:12px;z-index:2;
    display:flex;gap:8px;justify-content:center;}
  .card .dot{width:20px;height:20px;border-radius:50%;cursor:pointer;
    border:2px solid #ffffff55;transition:transform .12s;}
  .card .dot:hover{transform:scale(1.18);}
  .card .dot.active{border-color:#fff;transform:scale(1.18);}
  .bgbar{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:14px;flex-wrap:wrap;}
  .bgbar .blabel{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.08em;margin-right:4px;}
  .bgbar .bgdot{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2px solid #ffffff40;transition:transform .12s;}
  .bgbar .bgdot:hover{transform:scale(1.12);}
  .bgbar .bgdot.active{border-color:#fff;transform:scale(1.12);}
  @media (max-width:900px){ #grid{grid-template-columns:1fr;} .card{aspect-ratio:16/9;} }
</style></head>
<body>
  <header>
    <h1>xebia-animation-line</h1>
    <div class="sub">todas las animaciones · color por card con los círculos · fondo global abajo · <a href="./cards.html" style="color:#8be9ff;text-decoration:none;">ver cards y heroes →</a></div>
    <div class="bgbar" id="backgrounds"></div>
  </header>
  <div id="grid"></div>
  <script type="module" src="./grid.ts"></script>
</body></html>

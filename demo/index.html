<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><title>xebia-animation-line · grid</title>
<style>
  *{box-sizing:border-box;margin:0;}
  body{background:#05080f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#cde;}
  header{padding:18px 16px 6px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
  header h1{font-size:16px;font-weight:600;letter-spacing:.02em;}
  header .sub{font-size:12px;opacity:.55;}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:12px 16px 24px;}
  .cell{position:relative;height:230px;border-radius:12px;overflow:hidden;background:#06101a;border:1px solid #ffffff14;}
  .cell .stage{position:absolute;inset:0;}
  .cell .label{position:absolute;left:12px;bottom:10px;z-index:2;font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;text-shadow:0 1px 6px #000a;}
</style></head>
<body>
  <header>
    <h1>xebia-animation-line</h1>
    <span class="sub">todas las animaciones · clic en una para verla a pantalla completa</span>
  </header>
  <div id="grid"></div>
  <script type="module" src="./grid.ts"></script>
</body></html>

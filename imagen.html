<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>xebia-animation-line · imagen</title>
<style>
  *{box-sizing:border-box;margin:0;}
  body{background:#ffffff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#cde;}
  .nav{position:sticky;top:0;z-index:40;display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 18px;background:rgba(5,8,15,.82);backdrop-filter:blur(8px);border-bottom:1px solid #ffffff14;}
  .nav a{color:#cfd6e6;text-decoration:none;font-size:13px;white-space:nowrap;flex:0 0 auto;padding:6px 13px;border-radius:99px;border:1px solid #ffffff22;}
  .nav a.home{margin-right:10px;font-weight:700;border:none;font-size:14px;}
  .nav a.active{background:#fff;color:#0a1a24;border-color:#fff;}
  .nav a:not(.active):not(.home):hover{background:#ffffff16;border-color:#ffffff66;}
  .ctrls{position:sticky;top:47px;z-index:30;display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;padding:12px 20px;background:rgba(5,8,15,.8);backdrop-filter:blur(8px);border-bottom:1px solid #ffffff10;}
  .ctrls .lbl{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:.08em;}
  .grp{display:flex;gap:7px;align-items:center;}
  .swat{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #ffffff44;} .swat.active{border-color:#fff;transform:scale(1.12);}
  .pbtn{border:1px solid #ffffff2e;background:#ffffff10;color:#dff;font-size:11px;padding:5px 9px;border-radius:99px;cursor:pointer;font-family:inherit;}
  .pbtn.active{background:#fff;color:#0a1a24;border-color:#fff;}
  .intro{max-width:1100px;margin:24px auto 0;padding:0 22px;}
  .intro h1{font-size:26px;font-weight:600;letter-spacing:-.02em;color:#15101f;}
  .intro p{opacity:1;font-size:14px;margin-top:6px;color:#534c63;}
  .list{max-width:1180px;margin:0 auto;padding:22px;display:flex;flex-direction:column;gap:22px;}
  .ih{position:relative;aspect-ratio:16/9;min-height:380px;overflow:hidden;background-color:#0a0f17;background-size:cover;background-position:center;}
  .ih .bgimg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;}
  .ih .viz{position:absolute;inset:0;z-index:1;background:transparent;}
  .ih .viz canvas{position:absolute;inset:0;width:100%;height:100%;}
  /* revelado: rectángulos blancos que se van quitando y dejan ver la imagen (los puntos
     siguen corriendo por encima, intactos). */
  .ih .reveal{position:absolute;inset:0;z-index:4;display:grid;pointer-events:none;}
  .ih .reveal i{background:#ffffff;box-shadow:0 0 0 1px #ffffff;transition:opacity 0s linear var(--d,0s);}
  .ih.revealed .reveal i{opacity:0;}
  .ih.replaying .reveal i{transition:none;}
  .ih .overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;padding:34px;color:#fff;pointer-events:none;}
  .ih .overlay .kind{font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.75;}
  .ih .overlay .name{font-size:30px;font-weight:600;letter-spacing:-.02em;margin-top:4px;}
  .zoomctl{position:absolute;top:12px;right:12px;z-index:6;display:flex;align-items:center;gap:6px;background:#0006;border:none;border-radius:99px;padding:4px 8px;backdrop-filter:blur(6px);}
  .zoomctl button{width:22px;height:22px;border-radius:50%;border:none;background:#ffffff1f;color:#fff;cursor:pointer;font-size:15px;line-height:1;padding:0;font-family:inherit;}
  .zoomctl span{color:#fff;font-size:11px;min-width:34px;text-align:center;}
  .playbtn{position:absolute;top:12px;left:12px;z-index:6;display:inline-flex;align-items:center;height:28px;padding:0 12px;border:none;border-radius:99px;background:#0006;color:#fff;cursor:pointer;font-size:11px;letter-spacing:.04em;opacity:.85;backdrop-filter:blur(6px);font-family:inherit;}
  .playbtn:hover{opacity:1;background:#0009;}
  @media (prefers-reduced-motion: reduce){ .ih .reveal{display:none;} }
  /* versiones split: panel blanco + imagen/animación */
  .ih.split-left, .ih.split-right{display:flex;background-color:transparent;}
  .ih .panel{flex:0 0 38%;background:#f3ecf6;color:#0a1a24;display:flex;flex-direction:column;justify-content:space-between;gap:12px;padding:42px;}
  .ih .panel .pbottom{display:flex;flex-direction:column;gap:10px;}
  .ih .panel .ptag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.55;}
  .ih .panel .ptitle{font-size:32px;font-weight:600;letter-spacing:-.02em;}
  .ih .panel .ptxt{font-size:14px;opacity:.7;line-height:1.5;max-width:30ch;}
  .ih .media{position:relative;flex:1 1 auto;overflow:hidden;background-color:#0a0f17;background-size:cover;background-position:center;}
  @media (max-width:760px){
    .ih{aspect-ratio:16/10;min-height:0;}
    .ih.split-left, .ih.split-right{flex-direction:column;aspect-ratio:auto;}
    .ih .panel{flex:none;padding:24px;}
    .ih .panel .ptitle{font-size:23px;}
    .ih .panel .ptxt{font-size:13px;}
    .ih .media{aspect-ratio:16/10;}
    .ih .overlay{padding:22px;}
    .ih .overlay .name{font-size:22px;}
    .intro{margin-top:18px;}
    .intro h1{font-size:21px;}
    .intro p{font-size:13px;}
  }
</style>

  </div>
